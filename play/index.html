<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <meta name="robots" content="noindex, follow">
  <title>Hot Slice Free Demo — Play Now | Mari</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #000; font-family: Arial, Helvetica, sans-serif; }
    a { text-decoration: none; color: inherit; }

    /* Full-height flex container */
    .play-outer {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ── Top header strip ── */
    .play-header {
      background: #0d1117;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .play-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .play-logo-img {
      width: 32px; height: 32px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }
    .play-logo-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .play-logo-name {
      color: #fff;
      font-size: 19px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Toggle button (chevron) */
    .play-toggle {
      margin-left: auto;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #ccc;
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      transition: background 0.15s;
    }
    .play-toggle:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .play-toggle .chevron {
      display: inline-block;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .play-toggle.open .chevron { transform: rotate(180deg); }

    /* ── Main area below header ── */
    .play-main {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sliding panel ── */
    .play-panel {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      background: #141b24;
      transform: translateY(-100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .play-panel.open { transform: translateY(0); }

    .panel-content {
      padding: 14px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .panel-exit {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
    }
    .panel-exit:hover { background: rgba(255,255,255,0.13); }
    .panel-real {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #6b3fa0;
      color: #fff;
      padding: 15px;
      font-size: 15px;
      font-weight: bold;
      transition: background 0.15s;
    }
    .panel-real:hover { background: #5a2e90; }

    /* ── Backdrop (tap to close) ── */
    .play-backdrop {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: rgba(0,0,0,0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .play-backdrop.open { opacity: 1; pointer-events: auto; }

    /* ── Game iframe ── */
    .play-fill {
      width: 100%;
      height: 100%;
    }
    .play-fill iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

<div class="play-outer">

  <!-- Header strip: logo + toggle -->
  <div class="play-header">
    <a href="/" class="play-logo">
      <div class="play-logo-img">
        <img src="/img/mascot.webp" alt="Mari">
      </div>
      <span class="play-logo-name">Mari</span>
    </a>
    <button class="play-toggle" id="play-toggle" onclick="togglePanel()">
      <span class="chevron">&#8964;</span>
    </button>
  </div>

  <!-- Main: game + sliding panel on top -->
  <div class="play-main">

    <!-- Game iframe (always behind panel) -->
    <div class="play-fill">
      <iframe
        src="https://slotslaunch.com/iframe/34792?token=lkKmnvQWzKXGn6g1tCpzLWLzvIjjRTlSkidVjGVLhKQgz0xfzG"
        allowfullscreen
        allow="autoplay; fullscreen"
        scrolling="no"
        frameborder="0"
      ></iframe>
    </div>

    <!-- Backdrop: tap to close panel -->
    <div class="play-backdrop" id="play-backdrop" onclick="closePanel()"></div>

    <!-- Sliding menu panel -->
    <div class="play-panel" id="play-panel">
      <div class="panel-content">
        <a href="/" class="panel-exit">&#8592; Exit game</a>
        <a href="/go/" class="panel-real" rel="nofollow noopener noreferrer" target="_blank">
          &#9654;&nbsp; Play for Real Money
        </a>
      </div>
    </div>

  </div>
</div>

<script>
  var panelOpen = false;

  function togglePanel() {
    panelOpen ? closePanel() : openPanel();
  }

  function openPanel() {
    panelOpen = true;
    document.getElementById('play-panel').classList.add('open');
    document.getElementById('play-backdrop').classList.add('open');
    document.getElementById('play-toggle').classList.add('open');
  }

  function closePanel() {
    panelOpen = false;
    document.getElementById('play-panel').classList.remove('open');
    document.getElementById('play-backdrop').classList.remove('open');
    document.getElementById('play-toggle').classList.remove('open');
  }
</script>

</body>
</html>
